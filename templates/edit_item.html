<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <div class="auth-container">
        <h1>Edit Item</h1>

        {% with messages=get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}

        
        <form method="POST" action="{{ url_for('edit_item', item_id=item[0] ) }}">
            <label>Item Name</label>
            <input type="text" name="name" value="{{ item[1] }}" required>

            <label>MRP</label>
            <input type="number" name="mrp" value="{{ item[2] }}" required>

            <label>Purchase Rate</label>
            <input type="number" name="purchase_rate" value="{{ item[3] }}" required>

            <label>Low Stock Alert</label>
            <input type="number" name="low_stock" value="{{ item[4] }}" required>
            <div class="form-group">
            <button type="submit" class="btn">Update Item</button>
            </div>

        </form>
        <div class="back-btn">
        <a href="{{ url_for('add_item_details') }}"><-Back</a>
        </div>
    </div>
</body>
</html>
