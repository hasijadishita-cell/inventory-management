<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='add_item.css') }}">
</head>
<body>
    {% extends "base.html" %}
    {% block content %}
    <h1>Add New Item</h1>
    <hr>
    <form method="POST" class="form-container">
        <div class="form-group">
        <label>Item Name</label>
        <input type="text" name="name" required>
    </div>


        <div class="form-group">
    <label>MRP</label>
        <input type="number" name="mrp" required>
        <br>

        <label>Purchase Rate</label>
        <input type="number" name="purchase_rate" required>
        </div>


        <div class="form-group">
        <label>Low Stock Limit</label>
        <input type="number" name="low_stock" required>
    </div>
<div class="form-group">
        <button type="submit" class="btn">Add Item</button>
    </div>
    <div class="table">
        <a href="{{ url_for('add_item_details') }}">Items Table</a>
    </div>
    </form>
    {% with messages=get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
    <div>
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    
    {% endwith %}
    {% endblock %}

</body>
</html>
